name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: "0 6 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_version_tag: ${{ steps.meta.outputs.is_version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide release
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentSha = context.sha;
            const ref = context.ref;

            // Check if this is a version tag (v1.0.0, v1.2.3, etc)
            const isVersionTag = ref.startsWith('refs/tags/v') && /^refs\/tags\/v\d+\.\d+\.\d+$/.test(ref);

            let tagName, releaseName;

            if (isVersionTag) {
              // Version release (v1.0.0)
              tagName = ref.replace('refs/tags/', '');
              releaseName = `NTTS GUI ${tagName}`;
            } else {
              // Daily release
              const releaseDate = new Date().toISOString().slice(0, 10);
              tagName = `daily-${releaseDate}`;
              releaseName = `Daily build ${releaseDate}`;
            }

            let shouldRelease = true;

            if (!isVersionTag) {
              try {
                const latest = await github.rest.repos.getLatestRelease({ owner, repo });
                const latestTag = latest.data.tag_name;
                const { execSync } = require("node:child_process");
                const latestSha = execSync(`git rev-list -n 1 ${latestTag}`, { encoding: "utf8" }).trim();

                if (latestSha === currentSha) {
                  shouldRelease = false;
                }
              } catch (error) {
                core.info(`Latest release is not available or cannot be resolved: ${error.message}`);
                shouldRelease = true;
              }
            }

            core.setOutput("should_release", shouldRelease ? "true" : "false");
            core.setOutput("tag_name", tagName);
            core.setOutput("release_name", releaseName);
            core.setOutput("is_version_tag", isVersionTag ? "true" : "false");

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: dist:linux
            artifact_name: release-linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
          - os: windows-latest
            build_script: dist:win
            artifact_name: release-windows
            artifact_glob: |
              release/*.exe
              release/*.blockmap
          - os: macos-latest
            build_script: dist:mac
            artifact_name: release-macos
            artifact_glob: |
              release/*.dmg
              release/*.zip
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run ${{ matrix.build_script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  release:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.is_version_tag == 'false' }}
          files: release-artifacts/*
